name: Release Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          current_tag="$(git tag --points-at HEAD 'v*' | sort -V | tail -n 1 || true)"
          if [ -n "$current_tag" ]; then
            echo "version=${current_tag#v}" >> "$GITHUB_OUTPUT"
            echo "tag=$current_tag" >> "$GITHUB_OUTPUT"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag="$(git tag --list 'v*' | sort -V | tail -n 1 || true)"
          if [ -z "$latest_tag" ]; then
            latest_tag="v0.0.0"
            commit_range="HEAD"
          else
            commit_range="${latest_tag}..HEAD"
          fi

          commit_messages="$(git log "$commit_range" --pretty=format:'%s%n%b<<END>>')"
          if [ -z "$commit_messages" ]; then
            echo "No commits to release."
            exit 1
          fi

          bump="patch"
          if printf '%s\n' "$commit_messages" | grep -Eq 'BREAKING CHANGE|^[a-zA-Z0-9_-]+(\([^)]+\))?!:'; then
            bump="major"
          elif printf '%s\n' "$commit_messages" | grep -Eq '^feat(\([^)]+\))?:'; then
            bump="minor"
          fi

          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$version"

          case "$bump" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          next_version="${major}.${minor}.${patch}"
          next_tag="v${next_version}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$next_tag"
          git push origin "$next_tag"

          echo "version=$next_version" >> "$GITHUB_OUTPUT"
          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Build changelog entry
        id: changelog
        if: steps.version.outputs.created == 'true'
        shell: bash
        run: |
          set -euo pipefail

          latest_previous_tag="$(git tag --list 'v*' | sort -V | tail -n 2 | head -n 1 || true)"
          if [ -n "$latest_previous_tag" ]; then
            compare_url="https://github.com/${GITHUB_REPOSITORY}/compare/${latest_previous_tag}...${{ steps.version.outputs.tag }}"
            commit_range="${latest_previous_tag}..HEAD"
          else
            compare_url="https://github.com/${GITHUB_REPOSITORY}/commits/${{ steps.version.outputs.tag }}"
            commit_range="HEAD"
          fi

          release_date="$(date -u +%Y-%m-%d)"
          notes_file="$(mktemp)"
          {
            echo "## [${{ steps.version.outputs.tag }}](https://github.com/${GITHUB_REPOSITORY}/releases/tag/${{ steps.version.outputs.tag }}) - ${release_date}"
            echo
            echo "### Changes"
            git log "$commit_range" --pretty=format:'- %s (%h)'
            echo
            echo
            echo "[Full diff](${compare_url})"
          } > "$notes_file"

          {
            echo "notes_file=$notes_file"
            echo "previous_tag=$latest_previous_tag"
          } >> "$GITHUB_OUTPUT"

      - name: Update changelog
        if: steps.version.outputs.created == 'true'
        shell: bash
        run: |
          set -euo pipefail

          temp_changelog="$(mktemp)"
          {
            sed -n '1,2p' CHANGELOG.md
            echo
            cat "${{ steps.changelog.outputs.notes_file }}"
            echo
            tail -n +3 CHANGELOG.md
          } > "$temp_changelog"

          mv "$temp_changelog" CHANGELOG.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(changelog): update for ${{ steps.version.outputs.tag }} [skip ci]"
          git push origin HEAD:main

      - name: Create GitHub Release
        if: steps.version.outputs.created == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1 || \
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file "${{ steps.changelog.outputs.notes_file }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/multibucket-explorer
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
